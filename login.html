<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Plato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #6366F1; --primary-dark: #4F46E5; --primary-light: #EEF2FF;
      --text: #111827; --text-muted: #6B7280; --bg: #FFFFFF; --bg-alt: #F9FAFB;
      --border: #E5E7EB; --success: #10B981; --error: #EF4444;
      --radius: 16px; --shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: 'Inter', system-ui, sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; }

    /* NAV */
    nav { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; color: var(--primary); }
    .nav-logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .nav-logo-icon svg { width: 22px; height: 22px; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-muted); transition: color .2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--primary); font-weight: 600; }
    .nav-cta { background: var(--primary); color: white !important; padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; transition: background .2s; }
    .nav-cta:hover { background: var(--primary-dark); }

    /* AUTH LAYOUT */
    .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; background: linear-gradient(180deg, var(--primary-light) 0%, var(--bg) 100%); }
    .auth-card { width: 100%; max-width: 440px; background: white; border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; box-shadow: var(--shadow); }
    .auth-card h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .auth-card .subtitle { text-align: center; color: var(--text-muted); font-size: 15px; margin-bottom: 32px; }
    .form-row { margin-bottom: 20px; }
    .form-row label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .form-row input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; transition: border .2s; outline: none; background: var(--bg-alt); }
    .form-row input:focus { border-color: var(--primary); background: white; }
    .form-submit { width: 100%; padding: 14px; border-radius: 12px; background: var(--primary); color: white; font-size: 16px; font-weight: 700; transition: all .2s; margin-top: 8px; }
    .form-submit:hover { background: var(--primary-dark); }
    .form-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .form-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
    .form-footer a { color: var(--primary); font-weight: 600; }
    .form-footer a:hover { text-decoration: underline; }
    .form-divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; color: var(--text-muted); font-size: 13px; }
    .form-divider::before, .form-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .forgot-link { display: block; text-align: right; font-size: 13px; color: var(--primary); font-weight: 500; margin-top: -12px; margin-bottom: 20px; }
    .forgot-link:hover { text-decoration: underline; }
    .alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
    .alert-error { background: #FEF2F2; color: var(--error); border: 1px solid #FECACA; }
    .alert-success { background: #F0FDF4; color: var(--success); border: 1px solid #BBF7D0; }

    /* FOOTER */
    footer { padding: 32px 24px; border-top: 1px solid var(--border); text-align: center; }
    .footer-logo { font-size: 20px; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .footer-text { font-size: 13px; color: var(--text-muted); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="rgba(255,255,255,0.2)"/><path d="M8.5 7.5v9M12 7.5v3.5c0 1.5 3 1.5 3 0V7.5M15.5 14v2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        Plato
      </a>
      <div class="nav-links">
        <a href="index.html#avantages">Avantages</a>
        <a href="index.html#tarifs">Tarifs</a>
        <a href="faq.html">FAQ</a>
        <a href="signup.html" class="nav-cta">S'inscrire</a>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Bon retour</h1>
      <p class="subtitle">Connectez-vous pour accéder à votre espace</p>

      <div id="alert" class="alert alert-error"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-row">
          <label>Adresse email</label>
          <input type="email" id="email" placeholder="vous@restaurant.fr" required />
        </div>
        <div class="form-row">
          <label>Mot de passe</label>
          <input type="password" id="password" placeholder="Votre mot de passe" required />
        </div>
        <a href="#" class="forgot-link" onclick="handleReset(event)">Mot de passe oublié ?</a>
        <button type="submit" class="form-submit" id="submitBtn">Se connecter</button>
      </form>

      <div class="form-footer">
        Pas encore de compte ? <a href="signup.html">Créer un compte</a>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">Plato</div>
    <div class="footer-text">La commande à table, simplifiée. &copy; 2026 Plato. Tous droits réservés.</div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    // ===== CONFIGURATION FIREBASE =====
    // Remplacez par vos propres identifiants Firebase
    const firebaseConfig = {
      apiKey: "VOTRE_API_KEY",
      authDomain: "VOTRE_PROJET.firebaseapp.com",
      projectId: "VOTRE_PROJET",
      storageBucket: "VOTRE_PROJET.appspot.com",
      messagingSenderId: "VOTRE_SENDER_ID",
      appId: "VOTRE_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert alert-' + type;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      btn.textContent = 'Connexion...';
      btn.disabled = true;
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Une erreur est survenue.';
        if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = 'Email ou mot de passe incorrect.';
        if (err.code === 'auth/too-many-requests') msg = 'Trop de tentatives. Réessayez plus tard.';
        showAlert(msg, 'error');
        btn.textContent = 'Se connecter';
        btn.disabled = false;
      }
    }

    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      if (!email) { showAlert('Entrez votre email puis cliquez sur "Mot de passe oublié".', 'error'); return; }
      try {
        await auth.sendPasswordResetEmail(email);
        showAlert('Un email de réinitialisation a été envoyé.', 'success');
      } catch (err) {
        showAlert('Impossible d\'envoyer l\'email. Vérifiez l\'adresse.', 'error');
      }
    }
  </script>
</body>
</html>
